<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aish-coofee</title>
<style>
  .root{
    --muted: #8a7355;
  }
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background-color:palegoldenrod; 
  }
  .emoji-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .falling-emoji {
    position: absolute;
    top: -5%;
    font-size: 2rem;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 0.8;
    }
    90% {
      opacity: 0.8;
    }
    100% {
      transform: translateY(105vh) rotate(360deg);
      opacity: 0;
    }
  }
  .content {
    position: relative;
    z-index:50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    color: #070000;
    text-align: center;
    font-family:Georgia, 'Times New Roman', Times, serif;
  }
  .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--muted);
      color: #000000;
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-weight: 500;
      font-size: 1.25rem;
      text-decoration: none;
      border: 2px solid #3a2c14;
      border-radius: 12px;
      padding: 14px 28px;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,200,66,0.35);
    }
    .btn:active {
      transform: translateY(0);
    }
  
</style>
</head>
<body>

<div class="emoji-container" id="emojiContainer"></div>

<div class="content">
  <div>
    <h1>BUY ME A COFFEE</h1>
    <p>You love me right?</p>
    <p>show me 👀</p>

    <a class="btn" href="https://upi.pe/aishwaryanachiyar8@oksbi?pn=Aishwarya+Nachiyar+S" target="_blank">
      ☕ Buy me a coffee
    </a>

    
  </div>
</div>

<script>
  const container = document.getElementById('emojiContainer');
  const emojiCount = 40; 
  const emojis = ['☕', '🥨', '🥐', '🥖','🍪', '🍩','☕']; 

  for (let i = 0; i < emojiCount; i++) {
    const span = document.createElement('span');
    span.classList.add('falling-emoji');
    
    
    span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      
    span.style.left = Math.random() * 100 + '%';
    
    const duration = Math.random() * 12 + 10; 
    span.style.animationDuration = duration + 's';
    span.style.animationDelay = Math.random() * 3 + 's';
    
    span.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';

    container.appendChild(span);
  }
</script>

</body>
</html>
